<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나의 리더십 유형 테스트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 기본 리셋 및 모바일 최적화 설정 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            word-break: keep-all; /* 한국어 줄바꿈 최적화 */
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f1f3f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #202124;
        }

        /* 모바일 앱 컨테이너 (최대 너비 480px 제한) */
        #app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: #ffffff;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        /* 화면 공통 숨김 처리 */
        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 30px 24px;
            animation: fadeIn 0.4s ease-in-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 공통 버튼 스타일 */
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-size: 18px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background-color: #1a73e8;
            color: white;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
        }

        /* --- 1. 시작 화면 (Start Screen) --- */
        #start-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #e8f0fe 0%, #ffffff 100%);
        }

        .start-icon {
            font-size: 80px;
            color: #1a73e8;
            margin-bottom: 30px;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        #start-screen h1 {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        #start-screen p {
            font-size: 16px;
            color: #5f6368;
            margin-bottom: 50px;
            line-height: 1.5;
        }

        /* --- 2. 퀴즈 화면 (Quiz Screen) --- */
        #quiz-screen {
            justify-content: flex-start;
            padding-bottom: 40px;
        }

        /* 진행률 바 */
        .progress-container {
            width: 100%;
            background-color: #e8eaed;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .progress-bar {
            height: 100%;
            background-color: #1a73e8;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-number {
            font-size: 14px;
            color: #1a73e8;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.45;
            margin-bottom: 30px;
        }

        /* 선택지 버튼 영역 */
        #options-container {
            flex-grow: 1;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid #dadce0;
            color: #3c4043;
            text-align: left;
            justify-content: flex-start;
            padding: 16px 20px;
            font-weight: 500;
            font-size: 15px;
            line-height: 1.4;
            min-height: 70px;
        }

        /* 선택된 상태 (Highlight) */
        .option-btn.selected {
            border-color: #1a73e8;
            background-color: #e8f0fe;
            color: #1a73e8;
            font-weight: 700;
        }

        /* 하단 네비게이션 버튼 (이전/다음) */
        .nav-container {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-shrink: 0;
        }

        .nav-btn {
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-btn:active {
            transform: scale(0.97);
        }

        .btn-prev {
            flex: 1;
            background-color: #e8eaed;
            color: #5f6368;
        }

        .btn-next {
            flex: 2;
            background-color: #1a73e8;
            color: white;
            box-shadow: 0 4px 10px rgba(26, 115, 232, 0.2);
        }

        .btn-next:disabled {
            background-color: #a8c7fa;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* --- 3. 결과 화면 (Result Screen) --- */
        #result-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 50px;
        }

        .result-subtitle {
            font-size: 16px;
            color: #5f6368;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .result-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .result-icon-box {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            margin: 0 auto 30px auto;
        }

        .result-desc {
            font-size: 15px;
            color: #3c4043;
            line-height: 1.6;
            margin-bottom: 40px;
            background-color: #f8f9fa;
            padding: 24px;
            border-radius: 16px;
            text-align: left;
        }

        .result-desc ul {
            padding-left: 20px;
            margin-top: 15px;
        }

        .result-desc li {
            margin-bottom: 10px;
        }

        /* 결과별 색상 테마 (Google Colors) */
        .theme-speaker .result-title { color: #1a73e8; }
        .theme-speaker .result-icon-box { background-color: #e8f0fe; color: #1a73e8; }
        
        .theme-strategist .result-title { color: #ea4335; }
        .theme-strategist .result-icon-box { background-color: #fce8e6; color: #ea4335; }
        
        .theme-mood .result-title { color: #fbbc04; }
        .theme-mood .result-icon-box { background-color: #fef7e0; color: #fbbc04; }

        .theme-supporter .result-title { color: #34a853; }
        .theme-supporter .result-icon-box { background-color: #e6f4ea; color: #34a853; }

    </style>
</head>
<body>

<div id="app-container">
    
    <!-- 1. 시작 화면 -->
    <div id="start-screen" class="screen active">
        <i class="fa-solid fa-crown start-icon"></i>
        <h1>나의 리더십 무기는<br>무엇일까?</h1>
        <p>우리 학교 갓생 리더가 되기 위한<br>나만의 치트키(유형)를 알아보세요!</p>
        <button class="btn btn-primary" onclick="startQuiz()">테스트 시작하기 <i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <!-- 2. 퀴즈 화면 -->
    <div id="quiz-screen" class="screen">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="question-number" class="question-number">Q 1/25</div>
        <h2 id="question-text" class="question-text">질문 텍스트가 여기에 표시됩니다.</h2>
        
        <div id="options-container">
            <!-- 선택지 버튼들이 동적으로 생성됩니다 -->
        </div>

        <!-- 하단 네비게이션 -->
        <div class="nav-container">
            <button id="btn-prev" class="nav-btn btn-prev" onclick="goPrev()">이전</button>
            <button id="btn-next" class="nav-btn btn-next" onclick="goNext()" disabled>다음</button>
        </div>
    </div>

    <!-- 3. 결과 화면 -->
    <div id="result-screen" class="screen">
        <p class="result-subtitle">당신의 리더십 치트키는...</p>
        <div id="result-icon" class="result-icon-box"></div>
        <h1 id="result-title" class="result-title">유형 이름</h1>
        
        <div id="result-desc" class="result-desc">
            유형에 대한 설명이 이곳에 표시됩니다.
        </div>
        
        <button class="btn btn-primary" onclick="restartQuiz()">다시 테스트하기 <i class="fa-solid fa-rotate-right"></i></button>
    </div>

</div>

<script>
    // --- 25개 문항 데이터 ---
    const questionsData = [
        {
            text: "학생회 축제 기획 회의 중, 친구들의 의견이 엇갈려서 분위기가 싸해졌다. 나는 어떻게 할까?",
            options: [
                { text: "“우리가 이 행사를 왜 하는지 본질적인 목적부터 다시 생각해보자.”", type: "speaker" },
                { text: "“지금까지 나온 의견들을 찬반 표로 정리해서 다수결로 정하자.”", type: "strategist" },
                { text: "“일단 분위기 너무 무거우니까 좋아하는 노래 한 곡 듣고 다시 시작하자.”", type: "mood" },
                { text: "“양쪽 의견 다 일리가 있네. 둘을 적절히 섞을 방법은 없을까?”", type: "supporter" }
            ]
        },
        {
            text: "체육대회 당일, 갑자기 쏟아진 비 때문에 야외 일정이 꼬여버렸다! 나의 행동은?",
            options: [
                { text: "“여러분 집중! 지금부터 일정 변경 안내하겠습니다.” 하고 앞에서 상황을 정리한다.", type: "speaker" },
                { text: "비가 올 때를 대비해 미리 짜둔 플랜B 일정을 꺼내서 선생님과 확인한다.", type: "strategist" },
                { text: "“아쉽지만 어쩔 수 없지! 이왕 이렇게 된 거 비 맞으면서 단체 사진이라도 찍자!”", type: "mood" },
                { text: "당황한 친구들이 비를 피할 수 있도록 우산이나 천막을 먼저 찾아 챙긴다.", type: "supporter" }
            ]
        },
        {
            text: "수행평가 조별 과제를 할 때, 내가 가장 마음 편하게 느끼는 역할은?",
            options: [
                { text: "최종 결과물을 정리해서 선생님과 반 친구들에게 자신 있게 발표하기.", type: "speaker" },
                { text: "전체 목차를 잡고 각자 잘할 수 있는 분량을 공평하게 나누어 주기.", type: "strategist" },
                { text: "과제하기 싫어하는 조원들에게 다가가 장난치며 어떻게든 참여시키기.", type: "mood" },
                { text: "다른 친구들이 기피하거나 애매하게 남은 자료 조사 부분을 내가 맡아서 채우기.", type: "supporter" }
            ]
        },
        {
            text: "친구가 동아리 부원들과 트러블이 생겨서 속상해하며 나를 찾아왔다.",
            options: [
                { text: "친구의 억울한 점을 요약해주고, 어떻게 대화하면 좋을지 구체적인 방향을 제시한다.", type: "speaker" },
                { text: "갈등의 진짜 원인이 무엇인지 인과관계를 분석해서 객관적인 시각을 알려준다.", type: "strategist" },
                { text: "“진짜 화났겠다! 그 친구가 너무했네!” 하고 내 일처럼 폭풍 공감하며 화내준다.", type: "mood" },
                { text: "일단 아무 말 없이 친구가 감정을 다 쏟아낼 때까지 묵묵히 들어주고 토닥여준다.", type: "supporter" }
            ]
        },
        {
            text: "전교 학생회장 선거에 나간다면, 나를 당선시킬 가장 강력한 무기는?",
            options: [
                { text: "“이 후보를 뽑아야 하는 이유!” 뇌리에 꽂히는 슬로건과 흡입력 있는 연설.", type: "speaker" },
                { text: "뜬구름 잡지 않는 현실적이고 치밀한 공약 리스트와 체계적인 캠페인 일정.", type: "strategist" },
                { text: "지나가는 학생 누구에게나 스스럼없이 다가가 인사하는 미친 친화력과 하이텐션.", type: "mood" },
                { text: "친구들의 사소한 불만이나 학교생활의 작은 불편함까지 귀 기울여 듣는 섬세함.", type: "supporter" }
            ]
        },
        {
            text: "동아리 홍보 포스터를 만들 때 나의 주된 역할은?",
            options: [
                { text: "멀리서도 확 눈에 띄는 파격적인 카피(문구)를 고민해낸다.", type: "speaker" },
                { text: "일시, 장소, QR코드 등 필수 정보가 빠짐없이 들어갔는지 꼼꼼하게 검수한다.", type: "strategist" },
                { text: "“이거 넣으면 진짜 웃기겠다!” 최신 밈이나 유행어를 적극적으로 찾아온다.", type: "mood" },
                { text: "디자인 툴을 다루거나 폰트를 다운받는 등 묵묵히 실질적인 제작 작업을 돕는다.", type: "supporter" }
            ]
        },
        {
            text: "회의가 길어지면서 친구들의 집중력이 떨어지고 지쳐간다. 이때 나는?",
            options: [
                { text: "“자, 잡담은 여기까지 하고 이제 진짜 결론 내보자!” 하고 흐름을 끊고 집중시킨다.", type: "speaker" },
                { text: "“지금 시간이 딜레이되고 있으니, 이 안건은 내일 다시 논의하자”고 정리한다.", type: "strategist" },
                { text: "“다들 당 떨어졌지? 내가 사 온 젤리 먹으면서 해!” 하고 간식을 돌린다.", type: "mood" },
                { text: "피곤해하는 친구들을 위해 지금까지 나온 회의 내용을 단톡방에 요약해서 올려준다.", type: "supporter" }
            ]
        },
        {
            text: "축제 준비 중 예산이 부족하다는 사실을 알게 되었다면?",
            options: [
                { text: "선생님께 우리 기획의 가치를 어필하며 예산 증액을 당당하게 요청해본다.", type: "speaker" },
                { text: "당장 포기할 수 있는 항목과 유지해야 할 항목의 우선순위를 매겨 예산을 재분배한다.", type: "strategist" },
                { text: "“우리가 직접 몸으로 뛰어서 만들면 되지!” 재활용이나 수작업으로 때우자고 제안한다.", type: "mood" },
                { text: "혹시 내가 개인적으로 가지고 있는 물품 중 부스에 빌려줄 수 있는 게 없는지 찾아본다.", type: "supporter" }
            ]
        },
        {
            text: "처음 보는 친구들과 학교 대표로 조별 활동을 하게 되었다. 나의 첫 행동은?",
            options: [
                { text: "“안녕! 나는 OO이야. 우리 이거 먼저 정해볼까?” 하며 먼저 대화를 주도한다.", type: "speaker" },
                { text: "과제의 목표부터 확인하고 “각자 잘하는 게 뭔지 파악해서 역할을 나누자”고 제안한다.", type: "strategist" },
                { text: "“너 MBTI 뭐야? 혹시 E야?” 재미있는 스몰토크로 어색한 긴장감부터 푼다.", type: "mood" },
                { text: "누가 리더를 맡을지 눈치 볼 때, “내가 서기나 자료 정리를 할게”라며 궂은일을 자처한다.", type: "supporter" }
            ]
        },
        {
            text: "후배(또는 조원)가 큰 업무 실수를 해서 당황하며 울먹이고 있다. 나의 대처는?",
            options: [
                { text: "상황의 심각성을 짚어주되, 다음부터는 어떻게 해야 하는지 명확한 가이드라인을 준다.", type: "speaker" },
                { text: "이미 엎질러진 물이니, 지금 상황에서 리스크를 최소화할 수 있는 수습 방안부터 찾는다.", type: "strategist" },
                { text: "“나도 옛날에 똑같은 실수 한 적 있어! 너무 자책하지 마.” 일단 위로 먼저 해준다.", type: "mood" },
                { text: "조원이 너무 당황하지 않도록 옆에서 같이 실수를 수습할 방법을 조용히 거들어준다.", type: "supporter" }
            ]
        },
        {
            text: "학생회에서 새로운 캠페인을 기획할 때, 내가 가장 깊게 고민하는 부분은?",
            options: [
                { text: "‘이 캠페인의 메시지가 학생들에게 얼마나 강렬하게 전달될 수 있을까?’", type: "speaker" },

    const questionNumber = document.getElementById('question-number');
    const progressBar = document.getElementById('progress-bar');
    const optionsContainer = document.getElementById('options-container');
    const btnNext = document.getElementById('btn-next');
    const btnPrev = document.getElementById('btn-prev');

    // --- 함수 ---
    function startQuiz() {
        // 테스트 시작 시 원본 데이터를 복사해오면서, 각 문항의 선택지만 1회 섞어줍니다.
        // 뒤로 가기를 눌렀을 때 선택지 순서가 바뀌지 않게 하기 위함입니다.
        questions = JSON.parse(JSON.stringify(questionsData));
        questions.forEach(q => {
            for (let i = q.options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
            }
        });

        // 사용자 답변 기록 초기화 (25개 문항을 모두 null로 채움)
        userAnswers = new Array(questions.length).fill(null);

        startScreen.classList.remove('active');
        quizScreen.classList.add('active');
        currentQuestionIndex = 0;
        
        renderQuestion();
    }

    function renderQuestion() {
        const currentQuestion = questions[currentQuestionIndex];
        
        // 진행률 및 번호 업데이트
        questionNumber.innerText = `Q ${currentQuestionIndex + 1} / ${questions.length}`;
        const progressPercent = ((currentQuestionIndex) / questions.length) * 100;
        progressBar.style.width = `${progressPercent}%`;

        // 질문 텍스트 업데이트
        questionText.innerText = currentQuestion.text;

        // 선택지 생성
        optionsContainer.innerHTML = '';
        currentQuestion.options.forEach((option) => {
            const button = document.createElement('button');
            button.className = 'btn option-btn';
            button.innerText = option.text;
            
            // 만약 사용자가 이전에 이 문항에서 선택했던 답이라면 색상을 칠해줌(복원)
            if (userAnswers[currentQuestionIndex] === option.type) {
                button.classList.add('selected');
            }

            button.onclick = () => selectOption(option.type, button);
            optionsContainer.appendChild(button);
        });

        // 이전 버튼 보이기/숨기기 처리 (1번 문제일 땐 이전 버튼 숨김)
        if (currentQuestionIndex === 0) {
            btnPrev.style.visibility = 'hidden';
        } else {
            btnPrev.style.visibility = 'visible';
        }

        // 다음 버튼 활성화 여부 처리 (옵션을 선택해야 활성화)
        if (userAnswers[currentQuestionIndex] === null) {
            btnNext.disabled = true;
        } else {
            btnNext.disabled = false;
        }

        // 마지막 문제일 경우 '다음' 버튼 텍스트를 '결과 보기'로 변경
        if (currentQuestionIndex === questions.length - 1) {
            btnNext.innerText = '결과 보기';
        } else {
            btnNext.innerText = '다음';
        }
    }

    function selectOption(selectedType, btnElement) {
        // 답변 기록 저장
        userAnswers[currentQuestionIndex] = selectedType;
        
        // UI 업데이트 (모든 버튼의 선택 효과 제거 후, 현재 누른 버튼만 추가)
        const buttons = optionsContainer.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.classList.remove('selected'));
        btnElement.classList.add('selected');

        // 하단 '다음' 버튼 활성화
        btnNext.disabled = false;
    }

    function goPrev() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            renderQuestion();
        }
    }

    function goNext() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            renderQuestion();
        } else {
            // 마지막 문제일 경우 결과 화면으로 이동
            progressBar.style.width = `100%`;
            setTimeout(showResult, 200); 
        }
    }

    function showResult() {
        quizScreen.classList.remove('active');
        resultScreen.classList.add('active');

        // 기록된 답변을 바탕으로 점수 합산
        let finalScores = { speaker: 0, strategist: 0, mood: 0, supporter: 0 };
        userAnswers.forEach(answer => {
            if(answer) finalScores[answer]++;
        });

        // 최고 점수 계산
        let maxScore = 0;
        let finalType = 'speaker'; // 기본값

        for (const [type, score] of Object.entries(finalScores)) {
            if (score > maxScore) {
                maxScore = score;
                finalType = type;
            }
        }

        // 결과 데이터 화면에 적용
        const resultData = results[finalType];
        
        // 이전 테마 클래스 제거
        resultScreen.classList.remove('theme-speaker', 'theme-strategist', 'theme-mood', 'theme-supporter');
        // 새 테마 클래스 추가
        resultScreen.classList.add(resultData.theme);

        document.getElementById('result-icon').innerHTML = resultData.icon;
        document.getElementById('result-title').innerHTML = resultData.title;
        document.getElementById('result-desc').innerHTML = resultData.desc;
    }

    function restartQuiz() {
        resultScreen.classList.remove('active');
        startScreen.classList.add('active');
    }
</script>
</body>
</html>
